<!DOCTYPE html>
<html lang="tr"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Personel Girişi - Zeus Diş Kliniği</title>
<link rel="stylesheet" href="style.css"></head><body>

<div class="login-wrapper">
  <div class="login-box">
    <div class="logo" style="justify-content:center;margin-bottom:1rem">
      <div class="logo-icon">⚡</div>
      <div class="logo-text">ZEUS</div>
    </div>
    <h2>Hoşgeldiniz</h2>
    <p class="sub">Personel ve admin girişi</p>
    
    <form id="loginForm">
      <div class="form-group"><label>E-posta</label><input type="email" id="email" required></div>
      <div class="form-group"><label>Şifre</label><input type="password" id="password" required></div>
      <button type="submit" class="btn btn-primary" style="width:100%">Giriş Yap</button>
    </form>
    
    <div style="margin-top:1.5rem;padding:1rem;background:var(--primary-light);border-radius:12px;font-size:.85rem">
      <strong>Demo Hesaplar:</strong><br>
      👑 Admin: <code>admin@zeus.com</code> / <code>admin123</code><br>
      👤 Personel: <code>ayse@zeus.com</code> / <code>1234</code>
    </div>
    
    <div style="text-align:center;margin-top:1.5rem">
      <a href="index.html" style="color:var(--text-light);font-size:.9rem">← Anasayfaya dön</a>
    </div>
  </div>
</div>

<script src="script.js"></script>
<script>
document.getElementById('loginForm').onsubmit = e => {
  e.preventDefault();
  const u = login(document.getElementById('email').value, document.getElementById('password').value);
  if (u) {
    toast('Hoşgeldiniz, ' + u.name);
    setTimeout(() => {
      window.location.href = u.role === 'admin' ? 'admin.html' : 'panel.html';
    }, 800);
  } else {
    toast('Hatalı e-posta veya şifre!', true);
  }
};
</script>
</body></html>
