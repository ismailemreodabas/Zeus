<!DOCTYPE html>
<html lang="tr"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Paneli - Zeus</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.5rem}
  .kpi{background:#fff;padding:1.5rem;border-radius:16px;box-shadow:var(--shadow);position:relative;overflow:hidden}
  .kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--primary)}
  .kpi.accent::before{background:var(--accent)}
  .kpi.success::before{background:var(--success)}
  .kpi.danger::before{background:var(--danger)}
  .kpi-label{font-size:.8rem;color:var(--text-light);text-transform:uppercase;letter-spacing:1px}
  .kpi-value{font-size:2rem;font-weight:700;margin:.3rem 0}
  .kpi-change{font-size:.85rem;color:var(--success)}
  .kpi-change.down{color:var(--danger)}
  .chart-row{display:grid;grid-template-columns:2fr 1fr;gap:1rem;margin-bottom:1.5rem}
  .chart-box{background:#fff;padding:1.5rem;border-radius:16px;box-shadow:var(--shadow)}
  .chart-box h3{margin-bottom:1rem}
  .calendar{background:#fff;border-radius:16px;padding:1.5rem;box-shadow:var(--shadow)}
  .calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:1rem}
  .cal-head{text-align:center;font-weight:600;font-size:.8rem;color:var(--text-light);padding:.5rem}
  .cal-day{aspect-ratio:1;background:#f7fafc;border-radius:8px;padding:.5rem;cursor:pointer;position:relative;font-size:.85rem;transition:.2s}
  .cal-day:hover{background:var(--primary-light)}
  .cal-day.has-app{background:var(--primary-light);border:2px solid var(--primary);font-weight:600}
  .cal-day.today{background:var(--accent);color:#fff;font-weight:700}
  .cal-day.empty{background:transparent;cursor:default}
  .cal-count{position:absolute;bottom:4px;right:4px;background:var(--primary);color:#fff;font-size:.65rem;border-radius:10px;padding:1px 6px}
  .filter-bar{display:flex;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
  .filter-bar input,.filter-bar select{padding:.6rem 1rem;border:1px solid var(--border);border-radius:10px;font-family:inherit}
  .settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
  .setting-card{background:#fff;padding:1.5rem;border-radius:16px;box-shadow:var(--shadow)}
  .status-ok{color:var(--success);font-weight:600}
  .status-bad{color:var(--danger);font-weight:600}
  .quick-actions{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem}
  .message-panel{background:#fff;border-radius:16px;padding:1.5rem;box-shadow:var(--shadow);margin-top:1rem}
  @media(max-width:900px){.kpi-grid{grid-template-columns:1fr 1fr}.chart-row,.settings-grid{grid-template-columns:1fr}}
  @media(max-width:600px){.kpi-grid{grid-template-columns:1fr}}
</style>
</head><body>

<div class="panel-wrapper">
  <aside class="sidebar">
    <div class="logo"><div class="logo-icon" style="background:linear-gradient(135deg,#e57878,#f4c56a)">👑</div><div class="logo-text">ZEUS<br><small style="font-size:.7rem">Admin</small></div></div>
    <ul class="sidebar-menu">
      <li><a href="#" class="active" data-view="dashboard">📊 Dashboard</a></li>
      <li><a href="#" data-view="appointments">📅 Randevular</a></li>
      <li><a href="#" data-view="calendar">🗓️ Takvim</a></li>
      <li><a href="#" data-view="patients">👥 Hastalar</a></li>
      <li><a href="#" data-view="doctors">🩺 Doktorlar</a></li>
      <li><a href="#" data-view="services">💎 Hizmetler</a></li>
      <li><a href="#" data-view="staff">🧑‍💼 Personel</a></li>
      <li><a href="#" data-view="messaging">💬 Mesaj Gönder</a></li>
      <li><a href="#" data-view="emails">✉️ E-posta Log</a></li>
      <li><a href="#" data-view="whatsapp">📱 WhatsApp Log</a></li>
      <li><a href="#" data-view="settings">⚙️ Ayarlar</a></li>
      <li><a href="#" onclick="logout();return false">🚪 Çıkış</a></li>
    </ul>
  </aside>
  
  <main class="main-content">
    <header class="main-header">
      <div>
        <h1 id="pageTitle">Dashboard</h1>
        <small style="color:var(--text-light)" id="pageSub">Genel bakış</small>
      </div>
      <div style="display:flex;gap:1rem;align-items:center">
        <div class="notif-bell" onclick="toggleNotif()">🔔<span class="notif-count" id="notifCount">0</span>
          <div class="notif-dropdown" id="notifDropdown"></div>
        </div>
        <div style="text-align:right"><strong id="userName"></strong><br><small style="color:var(--text-light)">👑 Admin</small></div>
      </div>
    </header>
    <div id="viewArea"></div>
  </main>
</div>

<div class="modal-bg" id="modal"><div class="modal" id="modalContent"></div></div>

<script src="script.js"></script>
<script>
const user = requireAuth('admin');
if (user) document.getElementById('userName').textContent = user.name;

// ========= BİLDİRİMLER =========
function loadNotifs() {
  const n = DB.get('notifications').filter(x=>!x.read).reverse();
  const el = document.getElementById('notifCount');
  el.textContent = n.length;
  el.style.display = n.length ? 'flex' : 'none';
  document.getElementById('notifDropdown').innerHTML = n.length ? n.map(x=>`
    <div class="notif-item"><h5>${x.title}</h5><p>${x.message}</p>
    <div class="time">${new Date(x.createdAt).toLocaleString('tr-TR')}</div></div>`).join('')
    : '<div class="notif-item"><p>Yeni bildirim yok</p></div>';
}
function toggleNotif() {
  const dd = document.getElementById('notifDropdown');
  dd.classList.toggle('open');
  if (dd.classList.contains('open')) {
    const notifs = DB.get('notifications'); notifs.forEach(n=>n.read=true); DB.set('notifications',notifs);
    setTimeout(()=>document.getElementById('notifCount').style.display='none', 1500);
  }
}
loadNotifs();
setInterval(loadNotifs, 3000);

function statusLabel(s){return {pending:'Bekliyor',confirmed:'Onaylı',completed:'Tamamlandı',cancelled:'İptal'}[s]||s}

// ========= DASHBOARD =========
const views = {
  dashboard() {
    const apps = DB.get('appointments');
    const today = new Date().toISOString().split('T')[0];
    const thisMonth = new Date().toISOString().slice(0,7);
    const lastMonth = new Date(Date.now()-30*86400000).toISOString().slice(0,7);
    const todayApps = apps.filter(a=>a.date===today);
    const thisMonthApps = apps.filter(a=>a.date.startsWith(thisMonth));
    const lastMonthApps = apps.filter(a=>a.date.startsWith(lastMonth));
    const completed = apps.filter(a=>a.status==='completed');
    const services = DB.get('services');
    const revenue = completed.reduce((sum,a) => {
      const svc = services.find(s=>s.name===a.service);
      return sum + (svc?.price || 0);
    }, 0);
    const thisMonthRev = thisMonthApps.filter(a=>a.status==='completed').reduce((sum,a) => {
      const svc = services.find(s=>s.name===a.service);
      return sum + (svc?.price || 0);
    }, 0);
    const growth = lastMonthApps.length ? Math.round((thisMonthApps.length-lastMonthApps.length)/lastMonthApps.length*100) : 0;
    
    return `
      <div class="kpi-grid">
        <div class="kpi">
          <div class="kpi-label">Toplam Randevu</div>
          <div class="kpi-value">${apps.length}</div>
          <div class="kpi-change ${growth<0?'down':''}">${growth>=0?'↑':'↓'} %${Math.abs(growth)} geçen aya göre</div>
        </div>
        <div class="kpi accent">
          <div class="kpi-label">Bugün</div>
          <div class="kpi-value">${todayApps.length}</div>
          <div class="kpi-change">${todayApps.filter(a=>a.status==='confirmed').length} onaylı</div>
        </div>
        <div class="kpi success">
          <div class="kpi-label">Bu Ay Ciro</div>
          <div class="kpi-value">₺${thisMonthRev.toLocaleString('tr-TR')}</div>
          <div class="kpi-change">${thisMonthApps.filter(a=>a.status==='completed').length} tamamlanan</div>
        </div>
        <div class="kpi danger">
          <div class="kpi-label">Bekleyen</div>
          <div class="kpi-value">${apps.filter(a=>a.status==='pending').length}</div>
          <div class="kpi-change">Onay bekliyor</div>
        </div>
      </div>
      
      <div class="chart-row">
        <div class="chart-box">
          <h3>📈 Son 7 Gün Randevu Trendi</h3>
          <canvas id="trendChart" height="80"></canvas>
        </div>
        <div class="chart-box">
          <h3>🎯 Durum Dağılımı</h3>
          <canvas id="statusChart" height="160"></canvas>
        </div>
      </div>
      
      <div class="chart-row">
        <div class="chart-box">
          <h3>💎 Hizmet Popülerliği</h3>
          <canvas id="serviceChart" height="100"></canvas>
        </div>
        <div class="chart-box">
          <h3>🔔 Son Aktiviteler</h3>
          <div style="max-height:220px;overflow-y:auto">
            ${apps.slice(-8).reverse().map(a=>`
              <div style="padding:.7rem 0;border-bottom:1px solid var(--border);font-size:.9rem">
                <strong>${a.firstName} ${a.lastName}</strong><br>
                <small>${a.service} • ${a.date} ${a.time}</small>
                <span class="badge badge-${a.status}" style="float:right">${statusLabel(a.status)}</span>
              </div>`).join('') || '<p>Henüz randevu yok</p>'}
          </div>
        </div>
      </div>
      
      <div class="chart-box">
        <h3>📅 Bugünün Programı</h3>
        ${todayApps.length ? renderAppTable(todayApps.sort((a,b)=>a.time.localeCompare(b.time))) : '<p style="padding:1rem;color:var(--text-light)">Bugün randevu yok</p>'}
      </div>
    `;
  },

  appointments() {
    return `
      <div class="quick-actions">
        <button class="btn btn-primary btn-sm" onclick="exportCSV()">📥 CSV İndir</button>
        <button class="btn btn-accent btn-sm" onclick="printAppointments()">🖨️ Yazdır</button>
      </div>
      <div class="filter-bar">
        <input type="text" id="searchApp" placeholder="🔍 Hasta, hizmet, telefon...">
        <select id="statusFilter">
          <option value="">Tüm Durumlar</option>
          <option value="pending">Bekliyor</option>
          <option value="confirmed">Onaylı</option>
          <option value="completed">Tamamlandı</option>
          <option value="cancelled">İptal</option>
        </select>
        <input type="date" id="dateFilter">
        <button class="btn btn-sm btn-outline" onclick="clearFilters()">Temizle</button>
      </div>
      <div id="appsList"></div>
    `;
  },

  calendar() {
    const now = new Date();
    const year = now.getFullYear();
    const month = now.getMonth();
    const monthName = now.toLocaleDateString('tr-TR',{month:'long',year:'numeric'});
    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month+1, 0).getDate();
    const apps = DB.get('appointments');
    const today = now.toISOString().split('T')[0];
    
    let html = `<div class="calendar">
      <h2 style="text-transform:capitalize">${monthName}</h2>
      <div class="calendar-grid">
      ${['Pzt','Sal','Çar','Per','Cum','Cmt','Paz'].map(d=>`<div class="cal-head">${d}</div>`).join('')}`;
    
    const offset = firstDay === 0 ? 6 : firstDay - 1;
    for (let i=0; i<offset; i++) html += '<div class="cal-day empty"></div>';
    
    for (let d=1; d<=daysInMonth; d++) {
      const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const dayApps = apps.filter(a=>a.date===dateStr);
      const classes = ['cal-day'];
      if (dayApps.length) classes.push('has-app');
      if (dateStr === today) classes.push('today');
      html += `<div class="${classes.join(' ')}" onclick="showDayApps('${dateStr}')">${d}
        ${dayApps.length ? `<div class="cal-count">${dayApps.length}</div>` : ''}
      </div>`;
    }
    html += '</div></div>';
    return html;
  },

  patients() {
    const apps = DB.get('appointments');
    const pmap = {};
    apps.forEach(a => {
      const k = a.email;
      if (!pmap[k]) pmap[k] = {name:`${a.firstName} ${a.lastName}`, phone:a.phone, email:a.email, count:0, spent:0, last:''};
      pmap[k].count++;
      if (a.date > pmap[k].last) pmap[k].last = a.date;
      if (a.status === 'completed') {
        const svc = DB.get('services').find(s=>s.name===a.service);
        pmap[k].spent += svc?.price || 0;
      }
    });
    const list = Object.values(pmap).sort((a,b)=>b.count-a.count);
    return `
      <div class="quick-actions">
        <button class="btn btn-primary btn-sm" onclick="exportPatients()">📥 Hasta Listesi CSV</button>
      </div>
      <table class="data-table">
        <thead><tr><th>Hasta</th><th>Telefon</th><th>E-posta</th><th>Randevu</th><th>Harcama</th><th>Son Ziyaret</th><th>İşlem</th></tr></thead>
        <tbody>
          ${list.length ? list.map(p=>`<tr>
            <td><strong>${p.name}</strong></td><td>${p.phone}</td><td>${p.email}</td>
            <td>${p.count}</td><td>₺${p.spent.toLocaleString('tr-TR')}</td><td>${p.last||'-'}</td>
            <td>
              <button class="btn btn-sm btn-outline" onclick='sendMessageToPatient(${JSON.stringify(p)})'>💬 Mesaj</button>
            </td>
          </tr>`).join('') : '<tr><td colspan="7" style="text-align:center;padding:2rem">Hasta yok</td></tr>'}
        </tbody>
      </table>`;
  },

  doctors() {
    const docs = DB.get('doctors');
    return `
      <button class="btn btn-primary" onclick="editDoctor()" style="margin-bottom:1rem">➕ Yeni Doktor</button>
      <table class="data-table">
        <thead><tr><th>Ad</th><th>Branş</th><th>Telefon</th><th>E-posta</th><th>İşlem</th></tr></thead>
        <tbody>
          ${docs.map(d=>`<tr>
            <td><strong>${d.name}</strong></td><td>${d.branch}</td><td>${d.phone}</td><td>${d.email}</td>
            <td>
              <button class="btn btn-sm btn-outline" onclick='editDoctor(${JSON.stringify(d)})'>Düzenle</button>
              <button class="btn btn-sm btn-danger" onclick="deleteDoctor(${d.id})">Sil</button>
            </td></tr>`).join('')}
        </tbody>
      </table>`;
  },

  services() {
    const svcs = DB.get('services');
    return `
      <button class="btn btn-primary" onclick="editService()" style="margin-bottom:1rem">➕ Yeni Hizmet</button>
      <table class="data-table">
        <thead><tr><th>Hizmet</th><th>Fiyat</th><th>Süre (dk)</th><th>İşlem</th></tr></thead>
        <tbody>
          ${svcs.map((s,i)=>`<tr>
            <td><strong>${s.name}</strong></td><td>₺${s.price?.toLocaleString('tr-TR')||0}</td>
            <td>${s.duration||0}</td>
            <td>
              <button class="btn btn-sm btn-outline" onclick='editService(${i})'>Düzenle</button>
              <button class="btn btn-sm btn-danger" onclick="deleteService(${i})">Sil</button>
            </td></tr>`).join('')}
        </tbody>
      </table>`;
  },

  staff() {
    const staff = DB.get('staff');
    return `
      <button class="btn btn-primary" onclick="editStaff()" style="margin-bottom:1rem">➕ Yeni Personel</button>
      <table class="data-table">
        <thead><tr><th>Ad</th><th>E-posta</th><th>Rol</th><th>İşlem</th></tr></thead>
        <tbody>
          ${staff.map(s=>`<tr>
            <td><strong>${s.name}</strong></td><td>${s.email}</td>
            <td><span class="badge badge-${s.role==='admin'?'confirmed':'pending'}">${s.role}</span></td>
            <td>
              <button class="btn btn-sm btn-outline" onclick='editStaff(${JSON.stringify(s)})'>Düzenle</button>
              ${s.id !== 1 ? `<button class="btn btn-sm btn-danger" onclick="deleteStaff(${s.id})">Sil</button>` : ''}
            </td></tr>`).join('')}
        </tbody>
      </table>`;
  },

  messaging() {
    const apps = DB.get('appointments');
    const patients = [...new Map(apps.map(a=>[a.email,{name:`${a.firstName} ${a.lastName}`, email:a.email, phone:a.phone}])).values()];
    return `
      <div class="message-panel">
        <h3>💬 Hastaya Toplu Mesaj / Tekil Mesaj</h3>
        <p style="color:var(--text-light);margin-bottom:1rem">Hastalara e-posta veya WhatsApp üzerinden mesaj gönderin.</p>
        
        <div class="form-group">
          <label>Alıcı</label>
          <select id="msgRecipient">
            <option value="all_email">📧 Tüm Hastalara E-posta</option>
            <option value="">── veya tek hasta ──</option>
            ${patients.map(p=>`<option value="${p.email}|${p.phone}|${p.name}">${p.name} (${p.email})</option>`).join('')}
          </select>
        </div>
        
        <div class="form-group">
          <label>Kanal</label>
          <select id="msgChannel">
            <option value="email">📧 E-posta</option>
            <option value="whatsapp">💬 WhatsApp (wa.me linki açar)</option>
          </select>
        </div>
        
        <div class="form-group"><label>Konu (e-posta için)</label><input id="msgSubject" placeholder="Konu..."></div>
        <div class="form-group"><label>Mesaj</label><textarea id="msgBody" rows="6" placeholder="Mesajınızı yazın..."></textarea></div>
        
        <button class="btn btn-primary" onclick="sendBulkMessage()">📤 Gönder</button>
      </div>
    `;
  },

  emails() {
    const logs = DB.get('email_log', []).slice().reverse();
    const sent = logs.filter(l=>l.status==='SENT').length;
    const failed = logs.filter(l=>l.status?.startsWith('FAILED')).length;
    return `
      <div class="kpi-grid" style="grid-template-columns:repeat(3,1fr)">
        <div class="kpi success"><div class="kpi-label">Gönderilen</div><div class="kpi-value">${sent}</div></div>
        <div class="kpi danger"><div class="kpi-label">Başarısız</div><div class="kpi-value">${failed}</div></div>
        <div class="kpi"><div class="kpi-label">Toplam</div><div class="kpi-value">${logs.length}</div></div>
      </div>
      ${logs.length ? logs.slice(0,50).map(l=>`
        <div class="card" style="margin-bottom:.8rem">
          <small style="color:var(--primary)">${new Date(l.sentAt).toLocaleString('tr-TR')}</small>
          <span class="${l.status==='SENT'?'status-ok':'status-bad'}" style="float:right">${l.status}</span>
          <h4 style="margin:.3rem 0">${l.subject}</h4>
          <p><strong>Alıcı:</strong> ${l.to}</p>
          <details><summary style="cursor:pointer;color:var(--primary)">Detay</summary>
            <pre style="background:#f7fafc;padding:.8rem;border-radius:8px;white-space:pre-wrap;font-size:.8rem;margin-top:.5rem">${l.body}</pre>
          </details>
        </div>`).join('') : '<p>E-posta kaydı yok</p>'}
    `;
  },

  whatsapp() {
    const logs = DB.get('whatsapp_log', []).slice().reverse();
    return `
      <p style="color:var(--text-light);margin-bottom:1rem">💡 CallMeBot üzerinden gönderilen WhatsApp mesajları</p>
      ${logs.length ? logs.slice(0,50).map(l=>`
        <div class="card" style="margin-bottom:.8rem">
          <small style="color:var(--primary)">${new Date(l.sentAt).toLocaleString('tr-TR')}</small>
          <span class="${l.status==='SENT'?'status-ok':'status-bad'}" style="float:right">${l.status}</span>
          <p><strong>Alıcı:</strong> +${l.to}</p>
          <pre style="background:#f7fafc;padding:.8rem;border-radius:8px;white-space:pre-wrap;font-size:.85rem;margin-top:.5rem">${l.message}</pre>
        </div>`).join('') : '<p>WhatsApp kaydı yok. CallMeBot kurulumu yaptığınızda otomatik çalışacak.</p>'}
    `;
  },

  settings() {
    const emailOK = !CONFIG.EMAILJS_PUBLIC_KEY.includes('BURAYA');
    const waOK = !CONFIG.WHATSAPP_API_KEY.includes('BURAYA');
    return `
      <div class="settings-grid">
        <div class="setting-card">
          <h3>📧 EmailJS Durumu</h3>
          <p style="margin:1rem 0"><strong>Durum:</strong> <span class="${emailOK?'status-ok':'status-bad'}">${emailOK?'✅ Aktif':'❌ Yapılandırılmadı'}</span></p>
          <p style="font-size:.9rem"><strong>Admin E-posta:</strong> ${CONFIG.ADMIN_EMAIL}</p>
          <p style="font-size:.9rem;color:var(--text-light);margin-top:1rem">
            Kurulum için: <a href="https://www.emailjs.com" target="_blank" style="color:var(--primary)">emailjs.com</a>'a kayıt olun,
            <code>script.js</code> dosyasındaki <code>CONFIG</code> bölümüne bilgilerinizi yazın.
          </p>
          <button class="btn btn-primary btn-sm" onclick="testEmail()" style="margin-top:1rem">🧪 Test E-postası Gönder</button>
        </div>
        
        <div class="setting-card">
          <h3>💬 WhatsApp (CallMeBot) Durumu</h3>
          <p style="margin:1rem 0"><strong>Durum:</strong> <span class="${waOK?'status-ok':'status-bad'}">${waOK?'✅ Aktif':'❌ Yapılandırılmadı'}</span></p>
          <p style="font-size:.9rem"><strong>Admin Telefon:</strong> +${CONFIG.ADMIN_PHONE}</p>
          <p style="font-size:.9rem;color:var(--text-light);margin-top:1rem">
            Kurulum için: WhatsApp'tan <strong>+34 644 51 95 23</strong> numarasına
            <code>"I allow callmebot to send me messages"</code> yazın.
          </p>
          <button class="btn btn-primary btn-sm" onclick="testWhatsApp()" style="margin-top:1rem">🧪 Test Mesajı Gönder</button>
        </div>
        
        <div class="setting-card">
          <h3>📱 SMS Gönderimi</h3>
          <p style="margin:1rem 0"><strong>Durum:</strong> <span class="status-bad">❌ Desteklenmiyor</span></p>
          <p style="font-size:.9rem;color:var(--text-light)">
            Gerçek SMS için backend + ücretli servis gerekir:
            <ul style="margin-top:.5rem;padding-left:1.2rem">
              <li><strong>NetGSM</strong> (Türkiye) - aylık ~₺100</li>

function renderAppTable(apps) {
  if (!apps.length) return '<p style="padding:2rem;text-align:center;color:var(--text-light)">Randevu bulunamadı</p>';
  return `<table class="data-table">
    <thead><tr><th>Hasta</th><th>Hizmet</th><th>Doktor</th><th>Tarih/Saat</th><th>Durum</th><th>İşlem</th></tr></thead>
    <tbody>${apps.map(a=>`<tr>
      <td><strong>${a.firstName} ${a.lastName}</strong><br><small>${a.phone}</small></td>
      <td>${a.service}</td><td>${a.doctor||'-'}</td>
      <td>${a.date}<br><small>${a.time}</small></td>
      <td><span class="badge badge-${a.status}">${statusLabel(a.status)}</span></td>
      <td>
        <select onchange="changeStatus(${a.id},this.value)" style="padding:.3rem;border-radius:6px;border:1px solid var(--border);font-size:.8rem">
          <option value="pending" ${a.status==='pending'?'selected':''}>Bekliyor</option>
          <option value="confirmed" ${a.status==='confirmed'?'selected':''}>Onayla</option>
          <option value="completed" ${a.status==='completed'?'selected':''}>Tamamla</option>
          <option value="cancelled" ${a.status==='cancelled'?'selected':''}>İptal</option>
        </select>
        <button class="btn btn-sm btn-danger" onclick="deleteApp(${a.id})">🗑️</button>
      </td></tr>`).join('')}
    </tbody></table>`;
}

// ========= FİLTRE =========
function applyFilters() {
  const q = document.getElementById('searchApp').value.toLowerCase();
  const s = document.getElementById('statusFilter').value;
  const d = document.getElementById('dateFilter').value;
  let apps = DB.get('appointments').sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  if (q) apps = apps.filter(a => `${a.firstName} ${a.lastName} ${a.email} ${a.phone} ${a.service}`.toLowerCase().includes(q));
  if (s) apps = apps.filter(a=>a.status===s);
  if (d) apps = apps.filter(a=>a.date===d);
  document.getElementById('appsList').innerHTML = renderAppTable(apps);
}
function clearFilters() {
  document.getElementById('searchApp').value='';
  document.getElementById('statusFilter').value='';
  document.getElementById('dateFilter').value='';
  applyFilters();
}

// ========= EXPORT =========
function exportCSV() {
  const apps = DB.get('appointments');
  const headers = ['Ad','Soyad','Telefon','E-posta','Hizmet','Doktor','Tarih','Saat','Durum','Not','Oluşturulma'];
  const rows = apps.map(a=>[a.firstName,a.lastName,a.phone,a.email,a.service,a.doctor||'',a.date,a.time,statusLabel(a.status),a.note||'',a.createdAt]);
  const csv = [headers, ...rows].map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = `randevular-${new Date().toISOString().split('T')[0]}.csv`; a.click();
  toast('CSV indirildi');
}
function exportPatients() {
  const apps = DB.get('appointments');
  const pmap = {};
  apps.forEach(a=>{ const k=a.email; if(!pmap[k]) pmap[k]={name:`${a.firstName} ${a.lastName}`,phone:a.phone,email:a.email,count:0}; pmap[k].count++; });
  const headers = ['Ad Soyad','Telefon','E-posta','Randevu Sayısı'];
  const rows = Object.values(pmap).map(p=>[p.name,p.phone,p.email,p.count]);
  const csv = [headers,...rows].map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='hastalar.csv'; a.click();
  toast('Hasta listesi indirildi');
}

// ========= MESAJLAŞMA =========
async function sendBulkMessage() {
  const r = document.getElementById('msgRecipient').value;
  const ch = document.getElementById('msgChannel').value;
  const subj = document.getElementById('msgSubject').value;
  const body = document.getElementById('msgBody').value;
  if (!body.trim()) return toast('Mesaj boş olamaz', true);
  
  if (r === 'all_email') {
    const apps = DB.get('appointments');
    const emails = [...new Set(apps.map(a=>a.email))];
    let sent = 0;
    for (const email of emails) {
      const ok = await sendRealEmail(CONFIG.EMAILJS_TEMPLATE_PATIENT, {
        to_email: email, subject: subj, patient_name: 'Değerli Hastamız',
        service:'-', date:'-', time:'-', doctor:'-', note: body
      });
      if (ok) sent++;
    }
    toast(`${sent}/${emails.length} e-posta gönderildi`);
  } else if (r) {
    const [email, phone, name] = r.split('|');
    if (ch === 'email') {
      const ok = await sendRealEmail(CONFIG.EMAILJS_TEMPLATE_PATIENT, {
        to_email: email, subject: subj, patient_name: name,
        service:'-', date:'-', time:'-', doctor:'-', note: body
      });
      toast(ok ? 'E-posta gönderildi' : 'Başarısız', !ok);
    } else {
      const cleanPhone = phone.replace(/\D/g,'');
      const pn = cleanPhone.startsWith('9') ? cleanPhone : '9'+cleanPhone;
      window.open(`https://wa.me/${pn}?text=${encodeURIComponent(body)}`, '_blank');
      toast('WhatsApp açıldı');
    }
  } else {
    toast('Alıcı seçin', true);
  }
}
function sendMessageToPatient(p) {
  loadView('messaging');
  setTimeout(() => {
    document.getElementById('msgRecipient').value = `${p.email}|${p.phone}|${p.name}`;
  }, 100);
}

// ========= VERİ YEDEKLEME =========
function backupData() {
  const data = {
    appointments: DB.get('appointments'),
    doctors: DB.get('doctors'),
    staff: DB.get('staff'),
    services: DB.get('services'),
    email_log: DB.get('email_log'),
    whatsapp_log: DB.get('whatsapp_log'),
    exportedAt: new Date().toISOString()
  };
  const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download = `zeus-yedek-${new Date().toISOString().split('T')[0]}.json`; a.click();
  toast('Yedek indirildi');
}
function restoreData(e) {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const d = JSON.parse(ev.target.result);
      Object.keys(d).forEach(k => { if (k !== 'exportedAt') DB.set(k, d[k]); });
      toast('Veriler yüklendi'); setTimeout(()=>location.reload(), 1000);
    } catch(err) { toast('Geçersiz dosya', true); }
  };
  r.readAsText(f);
}
function resetData() {
  if (!confirm('TÜM veriler silinecek! Emin misiniz?')) return;
  if (!confirm('Son uyarı! Geri alınamaz.')) return;
  localStorage.clear(); location.reload();
}

function editDoctor(d) {
  const isEdit = !!d;
  document.getElementById('modalContent').innerHTML = `
    <h3>${isEdit?'Doktor Düzenle':'Yeni Doktor'}</h3>
    <form id="docForm">
      <div class="form-group"><label>Ad Soyad</label><input name="name" required value="${d?.name||''}"></div>
      <div class="form-group"><label>Branş</label><input name="branch" required value="${d?.branch||''}"></div>
      <div class="form-group"><label>Telefon</label><input name="phone" required value="${d?.phone||''}"></div>
      <div class="form-group"><label>E-posta</label><input name="email" type="email" required value="${d?.email||''}"></div>
      <div class="modal-actions">
        <button type="button" class="btn btn-outline" onclick="closeModal()">İptal</button>
        <button type="submit" class="btn btn-primary">Kaydet</button>
      </div>
    </form>`;
  document.getElementById('modal').classList.add('open');
  document.getElementById('docForm').onsubmit = e => {
    e.preventDefault();
    const data = Object.fromEntries(new FormData(e.target).entries());

    if (isEdit) { const i = docs.findIndex(x=>x.id===d.id); docs[i]={...d,...data}; }
    else docs.push({id:Date.now(),...data});
    DB.set('doctors', docs); toast('Kaydedildi'); closeModal(); loadView('doctors');
  };
}

// ========= CHARTLAR =========
function renderCharts() {
  const apps = DB.get('appointments');
  
  // Trend (son 7 gün)
  const trendEl = document.getElementById('trendChart');
  if (trendEl) {
    const days = []; const counts = [];
    for (let i=6; i>=0; i--) {
      const d = new Date(Date.now()-i*86400000).toISOString().split('T')[0];
      days.push(new Date(d).toLocaleDateString('tr-TR',{day:'numeric',month:'short'}));
      counts.push(apps.filter(a=>a.date===d).length);
    }
    new Chart(trendEl, {
      type:'line',
      data:{labels:days,datasets:[{label:'Randevu',data:counts,borderColor:'#5ba8d9',backgroundColor:'rgba(91,168,217,0.1)',tension:0.4,fill:true}]},
      options:{responsive:true,plugins:{legend:{display:false}}}
    });
  }
  
  // Durum
  const statusEl = document.getElementById('statusChart');
  if (statusEl) {
    const statuses = ['pending','confirmed','completed','cancelled'];
    const data = statuses.map(s => apps.filter(a=>a.status===s).length);
    new Chart(statusEl, {
      type:'doughnut',
      data:{labels:['Bekliyor','Onaylı','Tamamlandı','İptal'],datasets:[{data,backgroundColor:['#f4c56a','#5ba8d9','#7cc288','#e57878']}]},
      options:{responsive:true}
    });
  }
  
  // Hizmet
  const svcEl = document.getElementById('serviceChart');
  if (svcEl) {
    const svcCount = {};
    apps.forEach(a => svcCount[a.service] = (svcCount[a.service]||0)+1);
    const labels = Object.keys(svcCount);
    const data = Object.values(svcCount);
    new Chart(svcEl, {
      type:'bar',
      data:{labels,datasets:[{label:'Randevu',data,backgroundColor:'#5ba8d9'}]},
      options:{responsive:true,plugins:{legend:{display:false}}}
    });
  }
}
