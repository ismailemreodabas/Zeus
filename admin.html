<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Panel - Zeus Diş Kliniği</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Segoe UI',sans-serif; background:#f5f7fa; color:#222; }
  .layout { display:flex; min-height:100vh; }
  
  /* Sidebar */
  .sidebar { width:250px; background:linear-gradient(180deg,#1e3a8a,#1e40af); color:white; padding:1.5rem 0; position:fixed; height:100vh; overflow-y:auto; z-index:100; transition:all .3s; }
  .sidebar h2 { text-align:center; margin-bottom:2rem; font-size:1.3rem; padding:0 1rem; }
  .sidebar h2 .logo-icon { display:inline-block; background:#fbbf24; color:#1e3a8a; padding:.3rem .6rem; border-radius:8px; margin-right:.5rem; }
  .nav-item { display:flex; align-items:center; gap:.8rem; padding:.85rem 1.5rem; cursor:pointer; transition:.2s; border-left:3px solid transparent; font-size:.95rem; }
  .nav-item:hover { background:rgba(255,255,255,.1); }
  .nav-item.active { background:rgba(251,191,36,.2); border-left-color:#fbbf24; }
  .nav-item .ico { font-size:1.2rem; width:24px; text-align:center; }
  
  /* Main */
  .main { flex:1; margin-left:250px; padding:2rem; transition:all .3s; }
  .topbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem; background:white; padding:1rem 1.5rem; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,.05); }
  .topbar h1 { font-size:1.5rem; color:#1e3a8a; }
  .topbar .user-info { display:flex; gap:1rem; align-items:center; }
  .topbar .badge-notif { position:relative; cursor:pointer; font-size:1.4rem; }
  .topbar .badge-notif .count { position:absolute; top:-5px; right:-5px; background:#ef4444; color:white; border-radius:50%; width:18px; height:18px; font-size:.7rem; display:flex; align-items:center; justify-content:center; }
  
  /* Cards */
  .stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:1.2rem; margin-bottom:2rem; }
  .stat-card { background:white; padding:1.5rem; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,.05); border-left:4px solid #1e40af; }
  .stat-card .label { color:#64748b; font-size:.9rem; margin-bottom:.5rem; }
  .stat-card .value { font-size:2rem; font-weight:bold; color:#1e3a8a; }
  .stat-card .sub { font-size:.8rem; color:#10b981; margin-top:.3rem; }
  .stat-card.warn { border-left-color:#f59e0b; }
  .stat-card.success { border-left-color:#10b981; }
  .stat-card.danger { border-left-color:#ef4444; }
  
  .card { background:white; padding:1.5rem; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,.05); margin-bottom:1.5rem; }
  .card h3 { color:#1e3a8a; margin-bottom:1rem; padding-bottom:.8rem; border-bottom:2px solid #f1f5f9; display:flex; justify-content:space-between; align-items:center; }
  
  /* Buttons */
  .btn { padding:.6rem 1.2rem; border:none; border-radius:8px; cursor:pointer; font-size:.9rem; font-weight:500; transition:.2s; display:inline-flex; align-items:center; gap:.4rem; }
  .btn-primary { background:#1e40af; color:white; }
  .btn-primary:hover { background:#1e3a8a; }
  .btn-success { background:#10b981; color:white; }
  .btn-danger { background:#ef4444; color:white; }
  .btn-warning { background:#f59e0b; color:white; }
  .btn-secondary { background:#64748b; color:white; }
  .btn-sm { padding:.4rem .8rem; font-size:.8rem; }
  
  /* Forms */
  input, select, textarea { width:100%; padding:.7rem; border:1px solid #e2e8f0; border-radius:8px; font-size:.9rem; font-family:inherit; }
  input:focus, select:focus, textarea:focus { outline:none; border-color:#1e40af; box-shadow:0 0 0 3px rgba(30,64,175,.1); }
  label { display:block; margin-bottom:.4rem; font-weight:500; color:#475569; font-size:.9rem; }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:1rem; }
  .form-group { margin-bottom:1rem; }
  
  /* Table */
  table { width:100%; border-collapse:collapse; }
  th, td { padding:.8rem; text-align:left; border-bottom:1px solid #e2e8f0; font-size:.9rem; }
  th { background:#f8fafc; color:#475569; font-weight:600; font-size:.85rem; }
  tr:hover { background:#f8fafc; }
  .table-wrapper { overflow-x:auto; }
  
  /* Status badges */
  .badge { padding:.2rem .7rem; border-radius:20px; font-size:.75rem; font-weight:500; }
  .badge-pending { background:#fef3c7; color:#92400e; }
  .badge-confirmed { background:#d1fae5; color:#065f46; }
  .badge-completed { background:#dbeafe; color:#1e40af; }
  .badge-cancelled { background:#fee2e2; color:#991b1b; }
  
  /* Calendar */
  .calendar-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem; }
  .calendar-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
  .cal-day-name { text-align:center; padding:.6rem; background:#1e40af; color:white; border-radius:6px; font-weight:600; font-size:.85rem; }
  .cal-day { background:#f8fafc; min-height:80px; padding:.5rem; border-radius:6px; cursor:pointer; transition:.2s; border:2px solid transparent; position:relative; }
  .cal-day:hover { background:#e2e8f0; border-color:#1e40af; }
  .cal-day.today { background:#fef3c7; border-color:#f59e0b; }
  .cal-day.has-apt { background:#dbeafe; }
  .cal-day.other-month { opacity:.3; }
  .cal-day .date-num { font-weight:bold; font-size:.95rem; }
  .cal-day .apt-count { font-size:.7rem; color:#1e40af; background:white; padding:2px 6px; border-radius:10px; display:inline-block; margin-top:4px; }
  
  /* Modal */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); display:none; align-items:center; justify-content:center; z-index:1000; padding:1rem; }
  .modal-overlay.active { display:flex; }
  .modal { background:white; border-radius:12px; padding:2rem; max-width:600px; width:100%; max-height:90vh; overflow-y:auto; }
  .modal h3 { color:#1e3a8a; margin-bottom:1rem; display:flex; justify-content:space-between; }
  .modal .close { cursor:pointer; font-size:1.5rem; color:#64748b; background:none; border:none; }
  
  /* Toast */
  .toast { position:fixed; top:20px; right:20px; background:#10b981; color:white; padding:1rem 1.5rem; border-radius:8px; z-index:2000; box-shadow:0 4px 12px rgba(0,0,0,.15); animation:slideIn .3s; }
  .toast.error { background:#ef4444; }
  @keyframes slideIn { from{transform:translateX(100%)} to{transform:translateX(0)} }
  
  /* Tabs */
  .tabs { display:flex; gap:.5rem; margin-bottom:1.5rem; border-bottom:2px solid #e2e8f0; flex-wrap:wrap; }
  .tab { padding:.6rem 1.2rem; cursor:pointer; border-bottom:3px solid transparent; color:#64748b; font-weight:500; }
  .tab.active { color:#1e40af; border-bottom-color:#1e40af; }
  
  /* Mobile */
  .menu-toggle { display:none; background:#1e40af; color:white; border:none; padding:.5rem .8rem; border-radius:8px; cursor:pointer; font-size:1.2rem; }
  @media (max-width:768px) {
    .sidebar { transform:translateX(-100%); width:230px; }
    .sidebar.open { transform:translateX(0); }
    .main { margin-left:0; padding:1rem; }
    .menu-toggle { display:block; }
    .form-row { grid-template-columns:1fr; }
    .topbar { flex-wrap:wrap; gap:1rem; }
    .cal-day { min-height:60px; padding:.3rem; font-size:.8rem; }
    th, td { padding:.5rem; font-size:.8rem; }
  }
  
  /* Pages editor */
  .page-editor-item { background:#f8fafc; padding:1rem; border-radius:8px; margin-bottom:.8rem; border-left:4px solid #1e40af; }
  .page-editor-item h4 { color:#1e3a8a; margin-bottom:.5rem; }
  
  .action-bar { display:flex; gap:.5rem; flex-wrap:wrap; margin-bottom:1rem; }
  
  @media print {
    .sidebar, .topbar, .action-bar, .btn, .menu-toggle { display:none !important; }
    .main { margin-left:0; padding:0; }
    .card { box-shadow:none; border:1px solid #ccc; }
  }
</style>
</head>
<body>

<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <h2><span class="logo-icon">⚡</span>ZEUS Admin</h2>
    <div class="nav-item active" data-page="dashboard"><span class="ico">📊</span>Kontrol Paneli</div>
    <div class="nav-item" data-page="appointments"><span class="ico">📋</span>Randevular</div>
    <div class="nav-item" data-page="calendar"><span class="ico">📅</span>Takvim</div>
    <div class="nav-item" data-page="patients"><span class="ico">👥</span>Hastalar</div>
    <div class="nav-item" data-page="doctors"><span class="ico">🩺</span>Doktorlar</div>
    <div class="nav-item" data-page="services"><span class="ico">💎</span>Hizmetler</div>
    <div class="nav-item" data-page="staff"><span class="ico">👤</span>Personel</div>
    <div class="nav-item" data-page="pages"><span class="ico">📄</span>Sayfa Yönetimi</div>
    <div class="nav-item" data-page="messages"><span class="ico">✉️</span>Mesajlar</div>
    <div class="nav-item" data-page="reports"><span class="ico">📈</span>Raporlar & Çıktılar</div>
    <div class="nav-item" data-page="settings"><span class="ico">⚙️</span>Ayarlar</div>
    <div class="nav-item" onclick="doLogout()" style="margin-top:2rem;color:#fca5a5;"><span class="ico">🚪</span>Çıkış</div>
  </aside>
  
  <!-- MAIN -->
  <main class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:1rem;">
        <button class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
        <h1 id="pageTitle">Kontrol Paneli</h1>
      </div>
      <div class="user-info">
        <div class="badge-notif" onclick="showPage('messages')">🔔<span class="count" id="notifCount">0</span></div>
        <span id="userName" style="color:#1e3a8a;font-weight:500;">Admin</span>
      </div>
    </div>
    <div id="content"></div>
  </main>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal" id="modalBody"></div>
</div>

<script src="script.js"></script>
<script>
// =============== KONTROL ===============
const user = currentUser();
if (!user) window.location.href = 'giris.html';
else document.getElementById('userName').textContent = user.name || 'Admin';

function doLogout(){ if(confirm('Çıkış yapmak istiyor musunuz?')) logout(); }

// =============== NAVIGATION ===============
document.querySelectorAll('.nav-item[data-page]').forEach(el=>{
  el.onclick = () => showPage(el.dataset.page);
});

function showPage(page){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const nav = document.querySelector(`.nav-item[data-page="${page}"]`);
  if(nav) nav.classList.add('active');
  document.getElementById('sidebar').classList.remove('open');
  
  const titles = {
    dashboard:'Kontrol Paneli', appointments:'Randevular', calendar:'Takvim',
    patients:'Hastalar', doctors:'Doktorlar', services:'Hizmetler',
    staff:'Personel', pages:'Sayfa Yönetimi', messages:'Mesajlar',
    reports:'Raporlar & Çıktılar', settings:'Ayarlar'
  };
  document.getElementById('pageTitle').textContent = titles[page];
  
  const renderers = {
    dashboard:renderDashboard, appointments:renderAppointments, calendar:renderCalendar,
    patients:renderPatients, doctors:renderDoctors, services:renderServices,
    staff:renderStaff, pages:renderPages, messages:renderMessages,
    reports:renderReports, settings:renderSettings
  };
  renderers[page]();
  updateNotifCount();
}

function updateNotifCount(){
  const msgs = DB.get('messages').filter(m=>!m.read).length;
  const notifs = DB.get('notifications').filter(n=>!n.read).length;
  document.getElementById('notifCount').textContent = msgs + notifs;
}

// =============== DASHBOARD ===============
function renderDashboard(){
  const apps = DB.get('appointments');
  const today = new Date().toISOString().slice(0,10);
  const todayApps = apps.filter(a=>a.date===today);
  const pending = apps.filter(a=>a.status==='pending').length;
  const thisMonth = apps.filter(a=>a.date.startsWith(today.slice(0,7))).length;
  const services = DB.get('services');
  const revenue = apps.filter(a=>a.status==='completed').reduce((s,a)=>{
    const svc = services.find(x=>x.name===a.service);
    return s + (svc?.price || 0);
  }, 0);
  
  document.getElementById('content').innerHTML = `
    <div class="stats-grid">
      <div class="stat-card"><div class="label">Bugünkü Randevu</div><div class="value">${todayApps.length}</div><div class="sub">▲ Aktif</div></div>
      <div class="stat-card warn"><div class="label">Bekleyen Onay</div><div class="value">${pending}</div><div class="sub">⏳ İşlem bekliyor</div></div>
      <div class="stat-card success"><div class="label">Bu Ay Toplam</div><div class="value">${thisMonth}</div><div class="sub">📅 Randevu</div></div>
      <div class="stat-card danger"><div class="label">Toplam Gelir</div><div class="value">₺${revenue.toLocaleString('tr-TR')}</div><div class="sub">💰 Tamamlanan</div></div>
    </div>
    <div class="card">
      <h3>🔔 Bugünkü Randevular</h3>
      ${todayApps.length===0 ? '<p style="color:#64748b;text-align:center;padding:2rem;">Bugün randevu yok</p>' : `
      <div class="table-wrapper"><table>
        <tr><th>Saat</th><th>Hasta</th><th>Hizmet</th><th>Doktor</th><th>Durum</th></tr>
        ${todayApps.sort((a,b)=>a.time.localeCompare(b.time)).map(a=>`
          <tr>
            <td><strong>${a.time}</strong></td>
            <td>${a.firstName} ${a.lastName}</td>
            <td>${a.service}</td>
            <td>${a.doctor||'-'}</td>
            <td><span class="badge badge-${a.status}">${statusText(a.status)}</span></td>
          </tr>
        `).join('')}
      </table></div>`}
    </div>
    <div class="card">
      <h3>⏰ Yaklaşan Randevular (2 Saat)</h3>
      <div id="upcomingList">${renderUpcoming()}</div>
    </div>
  `;
}

function renderUpcoming(){
  const apps = DB.get('appointments');
  const now = new Date();
  const in2h = new Date(now.getTime() + 2*60*60*1000);
  const upcoming = apps.filter(a=>{
    const ad = new Date(`${a.date}T${a.time}`);
    return ad > now && ad <= in2h && a.status !== 'cancelled';
  }).sort((a,b) => new Date(`${a.date}T${a.time}`) - new Date(`${b.date}T${b.time}`));
  
  if(upcoming.length===0) return '<p style="color:#64748b;text-align:center;padding:1rem;">Önümüzdeki 2 saatte randevu yok</p>';
  return upcoming.map(a=>`
    <div style="padding:.8rem;background:#fef3c7;border-radius:8px;margin-bottom:.5rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem;">
      <div><strong>⏰ ${a.time}</strong> - ${a.firstName} ${a.lastName} - ${a.service}</div>
      <button class="btn btn-sm btn-primary" onclick="sendReminderNow(${a.id})">📤 Hatırlatma Gönder</button>
    </div>
  `).join('');
}

function sendReminderNow(id){
  const app = DB.get('appointments').find(a=>a.id===id);
  if(!app) return;
  sendBrowserNotification('⏰ Randevu Hatırlatması', `${app.firstName} ${app.lastName} - ${app.time}`);
  if(typeof sendWhatsApp === 'function'){
    sendWhatsApp(CONFIG.ADMIN_PHONE, `⏰ HATIRLATMA\n${app.firstName} ${app.lastName}\n📅 ${app.date} ${app.time}\n💎 ${app.service}`);
  }
  toast('Hatırlatma gönderildi ✅');
}

// =============== RANDEVULAR ===============
function renderAppointments(){
  const apps = DB.get('appointments');
  document.getElementById('content').innerHTML = `
    <div class="card">
      <div class="action-bar">
        <button class="btn btn-primary" onclick="openAppointmentModal()">➕ Yeni Randevu</button>
        <button class="btn btn-success" onclick="exportExcel('appointments')">📊 Excel'e Aktar</button>
        <button class="btn btn-secondary" onclick="window.print()">🖨️ Yazdır</button>
        <select id="filterStatus" onchange="filterApps()" style="width:auto;">
          <option value="">Tüm Durumlar</option>
          <option value="pending">Bekleyen</option>
          <option value="confirmed">Onaylı</option>
          <option value="completed">Tamamlandı</option>
          <option value="cancelled">İptal</option>
        </select>
        <input type="text" id="searchApp" placeholder="🔍 Ara..." oninput="filterApps()" style="width:auto;max-width:200px;">
      </div>
      <div class="table-wrapper"><table id="appTable">
        <thead><tr>
          <th>Tarih</th><th>Saat</th><th>Hasta</th><th>Telefon</th><th>Hizmet</th><th>Doktor</th><th>Durum</th><th>İşlem</th>
        </tr></thead>
        <tbody>${renderAppRows(apps)}</tbody>
      </table></div>
    </div>
  `;
}

function renderAppRows(apps){
  if(!apps.length) return '<tr><td colspan="8" style="text-align:center;padding:2rem;color:#64748b;">Randevu yok</td></tr>';
  return apps.sort((a,b)=>new Date(b.date+'T'+b.time) - new Date(a.date+'T'+a.time)).map(a=>`
    <tr>
      <td>${a.date}</td><td>${a.time}</td>
      <td>${a.firstName} ${a.lastName}</td>
      <td><a href="tel:${a.phone}">${a.phone}</a></td>
      <td>${a.service}</td><td>${a.doctor||'-'}</td>
      <td><span class="badge badge-${a.status}">${statusText(a.status)}</span></td>
      <td>
        <button class="btn btn-sm btn-success" onclick="changeStatus(${a.id},'confirmed')">✓</button>
        <button class="btn btn-sm btn-primary" onclick="changeStatus(${a.id},'completed')">✔</button>
        <button class="btn btn-sm btn-warning" onclick="changeStatus(${a.id},'cancelled')">✕</button>
        <button class="btn btn-sm btn-danger" onclick="deleteApp(${a.id})">🗑️</button>
      </td>
    </tr>
  `).join('');
}

function filterApps(){
  const s = document.getElementById('filterStatus').value;
  const q = document.getElementById('searchApp').value.toLowerCase();
  let apps = DB.get('appointments');
  if(s) apps = apps.filter(a=>a.status===s);
  if(q) apps = apps.filter(a=>(`${a.firstName} ${a.lastName} ${a.phone} ${a.service}`).toLowerCase().includes(q));
  document.querySelector('#appTable tbody').innerHTML = renderAppRows(apps);
}

function changeStatus(id,status){
  if(!confirm('Durumu değiştirmek istiyor musunuz?')) return;
  updateAppointmentStatus(id, status);
  toast('Durum güncellendi ✅');
  renderAppointments();
}

function deleteApp(id){
  if(!confirm('Bu randevuyu silmek istediğinize emin misiniz?')) return;
  DB.set('appointments', DB.get('appointments').filter(a=>a.id!==id));
  toast('Randevu silindi ✅');
  renderAppointments();
}

function openAppointmentModal(date=''){
  const services = DB.get('services');
  const doctors = DB.get('doctors');
  openModal(`
    <h3>➕ Yeni Randevu <button class="close" onclick="closeModal()">×</button></h3>
    <div class="form-row">
      <div><label>Ad</label><input id="apFirst"></div>
      <div><label>Soyad</label><input id="apLast"></div>
    </div>
    <div class="form-row">
      <div><label>Telefon</label><input id="apPhone" placeholder="+90..."></div>
      <div><label>E-posta</label><input id="apEmail" type="email"></div>
    </div>
    <div class="form-row">
      <div><label>Tarih</label><input id="apDate" type="date" value="${date}"></div>
      <div><label>Saat</label><input id="apTime" type="time"></div>
    </div>
    <div class="form-row">
      <div><label>Hizmet</label><select id="apService">${services.map(s=>`<option>${s.name}</option>`).join('')}</select></div>
      <div><label>Doktor</label><select id="apDoctor"><option value="">Farketmez</option>${doctors.map(d=>`<option>${d.name}</option>`).join('')}</select></div>
    </div>
    <div class="form-group"><label>Not</label><textarea id="apNote" rows="2"></textarea></div>
    <button class="btn btn-primary" onclick="saveApp()">💾 Kaydet</button>
  `);
}

function saveApp(){
  const data = {
    firstName: document.getElementById('apFirst').value,
    lastName: document.getElementById('apLast').value,
    phone: document.getElementById('apPhone').value,
    email: document.getElementById('apEmail').value,
    date: document.getElementById('apDate').value,
    time: document.getElementById('apTime').value,
    service: document.getElementById('apService').value,
    doctor: document.getElementById('apDoctor').value,
    note: document.getElementById('apNote').value
  };
  if(!data.firstName || !data.date || !data.time){ toast('Zorunlu alanları doldurun',true); return; }
  createAppointment(data);
  toast('Randevu oluşturuldu ✅');
  closeModal();
  renderAppointments();
}

// =============== TAKVİM ===============
let calMonth = new Date().getMonth();
let calYear = new Date().getFullYear();

function renderCalendar(){
  document.getElementById('content').innerHTML = `
    <div class="card">
      <div class="calendar-header">
        <button class="btn btn-primary btn-sm" onclick="changeMonth(-1)">← Önceki</button>
        <h3 id="calTitle" style="border:none;margin:0;"></h3>
        <button class="btn btn-primary btn-sm" onclick="changeMonth(1)">Sonraki →</button>
      </div>
      <p style="color:#64748b;font-size:.9rem;margin-bottom:1rem;">💡 Bir güne tıklayarak randevu ekleyebilir veya mevcut randevuları görebilirsiniz</p>
      <div id="calBody"></div>
    </div>
  `;
  drawCalendar();
}

function changeMonth(d){
  calMonth += d;
  if(calMonth<0){ calMonth=11; calYear--; }
  if(calMonth>11){ calMonth=0; calYear++; }
  drawCalendar();
}

function drawCalendar(){
  const months = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
  document.getElementById('calTitle').textContent = `${months[calMonth]} ${calYear}`;
  
  const firstDay = new Date(calYear, calMonth, 1);
  const lastDay = new Date(calYear, calMonth+1, 0);
  const startWeek = (firstDay.getDay()+6)%7; // Pazartesi=0
  const apps = DB.get('appointments');
  const today = new Date().toISOString().slice(0,10);
  
  let html = `<div class="calendar-grid">
    ${['Pzt','Sal','Çar','Per','Cum','Cmt','Paz'].map(d=>`<div class="cal-day-name">${d}</div>`).join('')}`;
  
  for(let i=0;i<startWeek;i++) html += `<div class="cal-day other-month"></div>`;
  
  for(let d=1; d<=lastDay.getDate(); d++){
    const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayApps = apps.filter(a=>a.date===dateStr);
    const isToday = dateStr===today;
    html += `<div class="cal-day ${isToday?'today':''} ${dayApps.length?'has-apt':''}" onclick="openDayModal('${dateStr}')">
      <div class="date-num">${d}</div>
      ${dayApps.length?`<div class="apt-count">${dayApps.length} randevu</div>`:''}
    </div>`;
  }
  html += '</div>';
  document.getElementById('calBody').innerHTML = html;
}

function openDayModal(date){
  const apps = DB.get('appointments').filter(a=>a.date===date).sort((a,b)=>a.time.localeCompare(b.time));
  openModal(`
    <h3>📅 ${date} <button class="close" onclick="closeModal()">×</button></h3>
    ${apps.length ? apps.map(a=>`

function switchMsgTab(el, panel){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));

  document.getElementById('msgsPanel').style.display = panel==='msgs'?'block':'none';
  document.getElementById('notifsPanel').style.display = panel==='notifs'?'block':'none';
}

function markRead(id, key){
  const list = DB.get(key);
  const i = list.findIndex(x=>x.id===id);
  if(i>=0){ list[i].read = true; DB.set(key, list); }
  renderMessages();
  updateNotifCount();
}

function deleteMsg(id, key){
  if(!confirm('Silmek istediğinize emin misiniz?')) return;
  DB.set(key, DB.get(key).filter(x=>x.id!==id));
  renderMessages();
  updateNotifCount();
}

      ${Object.keys(byMonth).length?Object.keys(byMonth).sort().reverse().map(m=>`
        <div style="display:flex;justify-content:space-between;padding:.5rem;border-bottom:1px solid #e2e8f0;">
          <span>${m}</span><strong>${byMonth[m]} randevu</strong>
        </div>
      `).join(''):'<p style="color:#64748b;">Veri yok</p>'}
    </div>
    
    <div class="card">
      <h3>💎 Hizmete Göre Dağılım</h3>
      ${Object.keys(byService).length?Object.entries(byService).sort((a,b)=>b[1]-a[1]).map(([name,cnt])=>`
        <div style="margin-bottom:.6rem;">
          <div style="display:flex;justify-content:space-between;"><span>${name}</span><strong>${cnt}</strong></div>
          <div style="background:#e2e8f0;height:8px;border-radius:4px;overflow:hidden;">
            <div style="background:#1e40af;height:100%;width:${(cnt/apps.length*100)}%"></div>
          </div>
        </div>
      `).join(''):'<p style="color:#64748b;">Veri yok</p>'}
    </div>
  `;
}

function exportExcel(type){
  const wb = XLSX.utils.book_new();
  
  if(type==='appointments' || type==='all'){
    const apps = DB.get('appointments').map(a=>({
      Tarih:a.date, Saat:a.time, Ad:a.firstName, Soyad:a.lastName,
      Telefon:a.phone, Email:a.email, Hizmet:a.service, Doktor:a.doctor,
      Durum:statusText(a.status), Not:a.note||''
    }));
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(apps), 'Randevular');
  }
  if(type==='patients' || type==='all'){
    const apps = DB.get('appointments');
    const pts = {};
    apps.forEach(a=>{
      if(!pts[a.phone]) pts[a.phone] = {Ad:`${a.firstName} ${a.lastName}`, Telefon:a.phone, Email:a.email, 'Randevu Sayısı':0};
      pts[a.phone]['Randevu Sayısı']++;
    });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(Object.values(pts)), 'Hastalar');
  }
  if(type==='doctors' || type==='all'){
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(DB.get('doctors')), 'Doktorlar');
  }
  if(type==='services' || type==='all'){
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(DB.get('services')), 'Hizmetler');
  }
  if(type==='staff' || type==='all'){
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(DB.get('staff').map(s=>({Ad:s.name,Email:s.email,Rol:s.role}))), 'Personel');
  }
  
  XLSX.writeFile(wb, `zeus_${type}_${new Date().toISOString().slice(0,10)}.xlsx`);
  toast('Excel indirildi ✅');
}

function exportCSV(){
  const apps = DB.get('appointments');
  const headers = ['Tarih','Saat','Ad','Soyad','Telefon','Email','Hizmet','Doktor','Durum'];
  const rows = apps.map(a=>[a.date,a.time,a.firstName,a.lastName,a.phone,a.email,a.service,a.doctor||'',statusText(a.status)]);
  const csv = [headers, ...rows].map(r=>r.map(c=>`"${(c||'').toString().replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `randevular_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  toast('CSV indirildi ✅');
}

function exportBackup(){
  const backup = {};
  ['appointments','doctors','services','staff','messages','notifications','pages','settings'].forEach(k=>{
    backup[k] = DB.get(k);
  });
  const blob = new Blob([JSON.stringify(backup,null,2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `zeus_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  toast('Yedek indirildi ✅');
}

function importBackup(){
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = '.json';
  inp.onchange = e=>{
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = evt=>{
      try {
        const data = JSON.parse(evt.target.result);
        if(!confirm('Mevcut veriler SİLİNECEK. Emin misiniz?')) return;
        Object.keys(data).forEach(k=>DB.set(k, data[k]));
        toast('Yedek yüklendi ✅');
        setTimeout(()=>location.reload(), 1000);
      } catch(err) {
        toast('Dosya geçersiz',true);
      }
    };
    reader.readAsText(file);
  };
  inp.click();
}

function switchSettings(el, tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  ['account','site','notif','danger'].forEach(t=>{
    document.getElementById('set-'+t).style.display = t===tab?'block':'none';
  });
}

function saveAccount(){
  const name = document.getElementById('accName').value;
  const email = document.getElementById('accEmail').value;
  const pass = document.getElementById('accPass').value;
  const pass2 = document.getElementById('accPass2').value;
  
  if(pass && pass !== pass2){ toast('Şifreler eşleşmiyor',true); return; }
  
  const staff = DB.get('staff');
  const i = staff.findIndex(s=>s.email===user.email);
  if(i<0){ toast('Hesap bulunamadı',true); return; }
  
  staff[i].name = name;
  staff[i].email = email;
  if(pass) staff[i].password = pass;
  DB.set('staff', staff);
  sessionStorage.setItem('zeus_session', JSON.stringify(staff[i]));
  toast('Hesap güncellendi ✅');
  setTimeout(()=>location.reload(), 800);
}

function saveSite(){
  const s = getSettings();
  s.siteName = document.getElementById('stSiteName').value;
  s.clinicPhone = document.getElementById('stCPhone').value;
  s.clinicEmail = document.getElementById('stCEmail').value;
  s.clinicAddress = document.getElementById('stCAddr').value;
  s.workingHours = document.getElementById('stHours').value;
  DB.set('settings', s);
  toast('Kaydedildi ✅');
}

function saveNotif(){
  const s = getSettings();
  s.adminEmail = document.getElementById('stAdEmail').value;
  s.adminPhone = document.getElementById('stAdPhone').value;
  s.reminderHours = +document.getElementById('stRemHours').value;

  s.emailjsTemplate = document.getElementById('stEmTpl').value;

  CONFIG.ADMIN_EMAIL = s.adminEmail;
  CONFIG.ADMIN_PHONE = s.adminPhone;
  CONFIG.EMAILJS_PUBLIC_KEY = s.emailjsKey;
  CONFIG.EMAILJS_SERVICE_ID = s.emailjsService;
  CONFIG.EMAILJS_TEMPLATE_ADMIN = s.emailjsTemplate;
  CONFIG.WHATSAPP_API_KEY = s.whatsappKey;

function clearAppointments(){
  if(!confirm('TÜM randevular silinecek. Emin misiniz?')) return;

function clearMessages(){
  if(!confirm('TÜM mesajlar silinecek. Emin misiniz?')) return;

function resetAll(){
  if(!confirm('⚠️ TÜM VERİLER SİLİNECEK! Devam?')) return;
  if(!confirm('Son uyarı: Geri alınamaz!')) return;
  localStorage.clear();

}

// =============== YARDIMCILAR ===============
function statusText(s){
  return {pending:'Beklemede',confirmed:'Onaylı',completed:'Tamamlandı',cancelled:'İptal'}[s] || s;
}

function openModal(html){
  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modal').classList.add('active');
}

function closeModal(){
  document.getElementById('modal').classList.remove('active');
}

// =============== 2 SAAT ÖNCE HATIRLATMA ===============
function check2HourReminders(){
  const apps = DB.get('appointments');
  const now = new Date();
  const s = getSettings();
  const hours = s.reminderHours || 2;
  const reminded = DB.get('reminded_2h', []);
  
  apps.forEach(app=>{
    if(app.status==='cancelled' || reminded.includes(app.id)) return;
    const ad = new Date(`${app.date}T${app.time}`);
    const diffMin = (ad - now) / 60000;
    const targetMin = hours * 60;
    
    // Hedef süre ± 5 dakika
    if(diffMin > targetMin-5 && diffMin <= targetMin+5){
      sendBrowserNotification(`⏰ ${hours} Saat Hatırlatması`,
        `${app.firstName} ${app.lastName} - ${app.time} (${app.service})`);
      if(typeof sendWhatsApp === 'function'){
        sendWhatsApp(CONFIG.ADMIN_PHONE,
          `⏰ *${hours} SAAT HATIRLATMA*\n👤 ${app.firstName} ${app.lastName}\n📅 ${app.date} ${app.time}\n💎 ${app.service}\n📞 ${app.phone}`);
      }
      reminded.push(app.id);
      DB.set('reminded_2h', reminded);
    }
  });
}
setInterval(check2HourReminders, 60000);
check2HourReminders();

  if(savedSettings.whatsappKey) CONFIG.WHATSAPP_API_KEY = savedSettings.whatsappKey;
}
